<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Volleyball 2</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-filters@5/dist/browser/pixi-filters.min.js"></script>
<style>
  @font-face{
    font-family:'PixelBold';
    src:url('https://cdn.jsdelivr.net/npm/@fontsource/press-start-2p@5.2.7/files/press-start-2p-latin-400-normal.woff2') format('woff2');
    font-weight:400;
    font-display:swap;
  }
  @font-face{
    font-family:'PixelTitle';
    src:url('https://cdn.jsdelivr.net/npm/@fontsource/jersey-10@5.2.8/files/jersey-10-latin-400-normal.woff2') format('woff2');
    font-weight:400;
    font-display:swap;
  }
  :root{
    --bg:#1b2030;
    --text-secondary:#9aa3b8;
    --text-tertiary:#6b7488;
    --border:#2a2f3a;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; color:#e8ecf4;
    /* Dot pattern tiled over the base background colour (the PNG is transparent,
       so --bg shows through the gaps). The 25%-opaque --bg layer on top dims the
       dots by 25% (CSS has no per-background-image opacity). */
    background:
      linear-gradient(rgba(27,32,48,0.50), rgba(27,32,48,0.50)),
      url('/Dot%20Pattern.png') repeat,
      var(--bg);
    font-family:system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:16px 12px 24px; gap:12px;
  }

  /* Top navbar: white-slime logo on the left, Discord CTA on the right. */
  #navbar{
    width:100%; max-width:750px;   /* match the game width, centered by the body */
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:8px;
  }
  .nav-logo{ display:inline-flex; align-items:center; gap:10px; }
  .nav-slime{ width:36px; height:25px; display:block; flex:none; }
  .nav-title{
    font-family:'PixelTitle','PixelBold',monospace; font-size:19px;
    letter-spacing:1px; color:#e8ecf4; white-space:nowrap;
  }
  .nav-discord{
    display:inline-flex; align-items:center; gap:8px;
    background:#5865F2; color:#fff; text-decoration:none;
    font-family:'PixelBold', monospace; font-size:10px; letter-spacing:0.5px;
    padding:9px 14px; border-radius:10px; border:1px solid #4752c4;
    transition:background 0.15s ease;
  }
  .nav-discord:hover{ background:#4752c4; }
  .nav-discord svg{ width:18px; height:18px; fill:currentColor; flex:none; order:1; } /* icon after the text */
  @media (max-width:480px){
    .nav-title{ display:none; }          /* logo-only on narrow screens */
    .nav-discord-text{ display:none; }   /* icon-only CTA */
    .nav-discord{ padding:9px 11px; }
  }

  #sv-board{
    position:absolute; top:0; left:10px; right:10px; z-index:3;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    background:rgba(59,66,82,0); border-radius:8px;
    padding:10px 0;
    font-family:'PixelBold', monospace;
    transform:scale(1); transform-origin:top center; /* whole board scaled, pinned top-center */
  }
  /* One row split into two equal halves. Each half holds the player's NAME on the
     outer edge and their circles + score (grouped) toward the centre, with
     "- VS -" dead-centred between the halves no matter how long the names are. */
  #sv-board .score-row{ display:flex; align-items:center; align-self:stretch; gap:10px; }
  #sv-board .namescore{ flex:1 1 0; min-width:0; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  #sv-board .scoregroup{ display:flex; align-items:center; gap:10px; flex:0 0 auto; }
  /* When a username is too long, wrap it onto the line below instead of clipping
     the board. hyphens:auto puts a dash at the break wherever the word allows one;
     overflow-wrap is the fallback so an unbreakable string still wraps rather than
     overflowing. The flex half bounds the width, so it wraps within the space left
     next to the score box (min-width:0 lets the flex item shrink to wrap). */
  #sv-board .lbl{ white-space:normal; overflow-wrap:break-word; hyphens:auto; -webkit-hyphens:auto; min-width:0; text-wrap:balance; }
  /* Online guest: reverse the row AND each half so this player sits on the left
     with their name still on the outer edge, matching the flipped court. */
  #sv-board.mirror .score-row, #sv-board.mirror .namescore, #sv-board.mirror .scoregroup{ flex-direction:row-reverse; }
  /* ...and swap the dot-row alignment so the wrapped dots still pack toward the score. */
  #sv-board.mirror .dotrow.left{ justify-content:flex-start; }
  #sv-board.mirror .dotrow.right{ justify-content:flex-end; }
  #sv-board .vs{ font-size:12px; color:#cfd6e4; padding:0 12px; white-space:nowrap;
    text-shadow:2px 2px 0 rgba(0,0,0,0.45); }
  #sv-board .lbl{ font-size:11px; line-height:15px; color:#fff; letter-spacing:1px; text-shadow:2px 2px 0 rgba(0,0,0,0.45); } /* line-height = font-size + 4px -> ~4px gap between wrapped lines */
  /* Align each name toward its outer edge so a wrapped second line hugs the board
     side instead of drifting toward the centre. The guest view flips the sides
     (.mirror), so the alignment flips with it. */
  #sv-board .lbl.blue{ color:#bfe0ff; text-align:left; }
  #sv-board .lbl.pink{ color:#ffc8dd; text-align:right; }
  #sv-board.mirror .lbl.blue{ text-align:right; }
  #sv-board.mirror .lbl.pink{ text-align:left; }
  #sv-board .numbox{
    font-size:18px; min-width:46px; text-align:center;
    padding:7px 6px 5px; border-radius:8px; line-height:1;
  }
  #sv-board .numbox.blue{
    background:#fff; color:#1c3f6e; border:3px solid #2f7fd6;
    box-shadow:inset 0 0 0 2px #d6e8fb;
  }
  #sv-board .numbox.pink{
    background:#e8537f; color:#fff; border:3px solid #7a1f3a;
    box-shadow:inset 0 0 0 2px #f08aab; text-shadow:1px 1px 0 rgba(0,0,0,0.3);
  }
  #sv-board .dotrow{ display:flex; gap:5px; flex-wrap:wrap; flex-shrink:0; max-width:164px; }
  #sv-board .dotrow.left{ justify-content:flex-end; }
  #sv-board .dotrow.right{ justify-content:flex-start; }
  #sv-board .dot{
    width:14px; height:14px; border-radius:50%; flex:0 0 auto;
    border:2px solid #cfd6e4; background:transparent;
    transition:background .15s, transform .15s;
  }
  #sv-board .dot.blue{ border-color:#bfe0ff; }
  #sv-board .dot.pink{ border-color:#ffc8dd; }
  #sv-board .dot.blue.on{ background:#fff; }   /* white fill (the sky behind is blue) */
  #sv-board .dot.pink.on{ background:#e8537f; }
  #sv-firstto{
    margin:0; font-family:'PixelBold', monospace; font-size:10px; letter-spacing:1px;
    color:#9fb3d1; white-space:nowrap;
  }

  /* Music toggle, pinned to the bottom-right of the screen. */
  /* Music toggle — an inline control button alongside Online / Reset / etc. */
  #musicbtn{
    position:relative; padding:6px 10px; cursor:pointer; color:#e8ecf4;
    display:inline-flex; align-items:center; justify-content:center;
    background:transparent; border:1px solid #3a4150; border-radius:8px;
  }
  #musicbtn svg{ width:18px; height:18px; display:block; }
  #musicbtn:hover{ background:#262c3b; }
  #musicbtn.music-off{ color:#8a93a6; }              /* dimmed when muted */
  #musicbtn.music-off::after{                         /* diagonal slash when muted */
    content:''; position:absolute; left:8px; right:8px; top:50%; height:2px;
    background:#e8537f; transform:rotate(-45deg); border-radius:2px;
  }

  /* In-game menu. Gear (bottom-left) pops out a horizontal category bar; picking
     a category opens a small panel above it. Chat has its own button (bottom-
     centre) and the music icon mirrors the gear on the bottom-right. */
  #menu-btn, #chat-btn, #court > #musicbtn{
    position:absolute; bottom:12px; z-index:6;
    display:flex; align-items:center; justify-content:center;
    color:#e8ecf4; background:rgba(27,32,48,0.7); border:2px solid rgba(255,255,255,0.25);
    border-radius:50%; width:38px; height:38px; padding:0; cursor:pointer;
    font-family:'PixelBold', monospace;
  }
  #menu-btn{ left:12px; }
  #court > #musicbtn{ right:12px; left:auto; }   /* mirrors the gear on the right */
  #menu-btn svg, #chat-btn svg, #court > #musicbtn svg{ display:block; width:20px; height:20px; }
  #menu-btn:hover, #chat-btn:hover, #court > #musicbtn:hover{ background:rgba(47,127,214,0.55); }
  /* Chat: a wider pill, centred along the bottom. */
  #chat-btn{ right:58px; left:auto; }   /* round icon, just left of the music icon */
  /* Category bar: pops out to the right of the gear. */
  #menu-bar{ position:absolute; left:58px; bottom:12px; z-index:6; height:38px; display:none; align-items:center; gap:6px; }
  #menu-bar.open{ display:flex; }
  .menu-cat{
    font-family:'PixelBold', monospace; font-size:10px; letter-spacing:1px; color:#fff;
    background:rgba(27,32,48,0.85); border:1px solid rgba(207,214,228,0.2); border-radius:8px;
    padding:8px 11px; cursor:pointer; white-space:nowrap;
  }
  .menu-cat:hover{ background:rgba(47,127,214,0.55); }
  .menu-cat.active{ background:#2f7fd6; border-color:#bfe0ff; }
  .menu-cat[data-cat="online"]:hover{ color:#9ef0ab; border-color:rgba(93,214,99,0.4); background:rgba(93,214,99,0.2); }
  .menu-cat[data-cat="online"].active{ color:#fff; border-color:rgba(93,214,99,0.6); background:rgba(93,214,99,0.3); }
  /* Secondary window: opens above the gear/bar, one category pane at a time. */
  #menu-panel{
    position:absolute; left:12px; bottom:10px; z-index:7;
    width:min(380px, calc(100% - 24px)); max-height:calc(100% - 80px); overflow-y:auto; scrollbar-width:none;
    display:none; background:rgba(20,24,36,0.9); border:2px solid rgba(255,255,255,0.18);
    backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    border-radius:12px; padding:12px; box-shadow:0 8px 28px rgba(0,0,0,0.5);
    font-family:'PixelBold', monospace; font-size:10px;
  }
  #menu-panel.open{ display:block; }
  #menu-panel::-webkit-scrollbar{ display:none; } /* hide the scrollbar (still scrolls) */
  .menu-pane{ display:none; flex-direction:column; gap:8px; }
  .menu-pane.active{ display:flex; }
  /* Neutralize the moved controls' full-width-row styling; stack them in the pane. */
  #menu-panel #lobby, #menu-panel #skin-grid{ width:100%; max-width:none; margin:0; padding:0; border:0; background:none; }
  .menu-pane button{ width:100%; }
  /* Skin controls keep their own sizing inside the pane (the full-width rule
     above stretched them): swatches stay 20px circles, boss buttons hug text. */
  .menu-pane #skin-grid .swatch{ width:20px; height:20px; flex:0 0 auto; padding:0; }
  .menu-pane #skin-grid .skin-boss{ width:auto; }
  /* Lobby: two rows ([First to + select + Create] / [OR + code + Join]); its
     buttons hug their content rather than stretching to the pane width. */
  .lobby-row{ display:flex; gap:8px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
  .menu-pane #lobby button{ flex:1 1 auto; width:auto; max-width:210px; }
  #menu-panel #leavebtn{ background:rgba(224,64,64,0.28); border-color:rgba(224,64,64,0.7); color:#fff; }
  #menu-panel #leavebtn:hover{ background:rgba(224,64,64,0.45); }
  #menu-panel #createbtn{ background:rgba(93,214,99,0.22); border-color:rgba(93,214,99,0.65); color:#9ef0ab; }
  #menu-panel #createbtn:hover{ background:rgba(93,214,99,0.4); }
  /* While hovering a skin button, fade the menu chrome + corner buttons so the
     slime preview shows through — but keep the skin swatches/boss crisp. */
  #menu-panel, #menu-bar, #menu-btn, #chat-btn, #court > #musicbtn{ transition:opacity .15s ease, background .15s ease; }
  #menu-panel:has(#cat-skins .swatches:hover, #cat-skins .skin-boss:hover, #cat-skins .skin-eyedropper:hover, #cat-skins .skin-custom:focus){ background:transparent; border-color:transparent; box-shadow:none; backdrop-filter:none; -webkit-backdrop-filter:none; }
  /* Clicking Stage/Filter reveals the stage behind; everything fades to 0 except the buttons. */
  #menu-panel.preview{ background:transparent; border-color:transparent; box-shadow:none; backdrop-filter:none; -webkit-backdrop-filter:none; }
  #menu-panel.preview .menu-field-label{ opacity:0; }
  #menu-panel.preview-stage #filterbtn{ opacity:0; }   /* changing the stage hides the filter button */
  #menu-panel.preview-filter #themebtn{ opacity:0; }   /* changing the filter hides the stage button */
  #court:has(#cat-skins .swatches:hover, #cat-skins .skin-boss:hover, #cat-skins .skin-eyedropper:hover, #cat-skins .skin-custom:focus) #menu-bar,
  #court:has(#cat-skins .swatches:hover, #cat-skins .skin-boss:hover, #cat-skins .skin-eyedropper:hover, #cat-skins .skin-custom:focus) #menu-btn,
  #court:has(#cat-skins .swatches:hover, #cat-skins .skin-boss:hover, #cat-skins .skin-eyedropper:hover, #cat-skins .skin-custom:focus) #chat-btn,
  #court:has(#cat-skins .swatches:hover, #cat-skins .skin-boss:hover, #cat-skins .skin-eyedropper:hover, #cat-skins .skin-custom:focus) #musicbtn{ opacity:0.2; }
  #menu-panel button:not(.swatch){ padding-top:12px; padding-bottom:12px; } /* secondary-pane button vertical padding (swatches stay round) */
  /* Rules button is always tinted to its ruleset: blue (Classic) / yellow (Power). */
  #menu-panel #gamemodebtn.rules-classic{ background:rgba(47,127,214,0.25); border-color:#2f7fd6; color:#bfe0ff; }
  #menu-panel #gamemodebtn.rules-classic:hover{ background:rgba(47,127,214,0.4); }
  #menu-panel #gamemodebtn.rules-power{ background:rgba(255,243,107,0.18); border-color:#fff36b; color:#fff36b; }
  #menu-panel #gamemodebtn.rules-power:hover{ background:rgba(255,243,107,0.32); }
  #menu-panel #controlhint, #menu-panel #powerhint{ font-size:10px; line-height:18px; } /* +~4px line spacing for the wrapping hint texts */
  #menu-panel #lobbystatus{ line-height:18px; }
  /* Highlight the hotkey keys in every control/power hint: blue (basic controls), yellow (power moves). */
  .controlhint b{ color:#bfe0ff; }
  .powerhint b{ color:#fff36b; }
  /* Normalize the whole menu + secondary panel to one face/size/weight, matching
     the 10px pixel category bar (overrides the buttons' default system-ui 13px). */
  #menu-panel button, #menu-panel input, #menu-panel select, #menu-panel label{
    font-family:'PixelBold', monospace; font-size:10px; font-weight:400;
  }
  .menu-cat, #menu-panel button{ text-transform:capitalize; }
  /* Force one font across the whole menu + secondary panel: PixelBold 10px.
     Covers stragglers (skin labels, lobby status, etc.) that set their own size,
     including inline font-size, hence !important. */
  #menu-bar, #menu-bar *, #menu-panel, #menu-panel *{
    font-family:'PixelBold', monospace !important; font-size:10px !important; font-weight:400 !important;
  }
  /* A field row: a label on the left, the control filling the rest of the width. */
  .menu-field{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .menu-field > .menu-field-label{ flex:0 0 auto; color:var(--text-secondary); font-family:'PixelBold', monospace; font-size:10px; }
  #menu-panel .menu-field button{ flex:1 1 auto; width:auto; }
  #menu-panel #theme-filter-row{ flex-direction:column; gap:8px; }
  #cat-mode button{ max-width:250px; }              /* cap every Mode-menu button */
  #cat-mode > button{ align-self:flex-end; }        /* right-align the non-field ones (Win/Restart) to match */
  #cat-stage button{ max-width:250px; }
  /* TEMP: menu bar shown as a centred row below the game; gear + chat hidden. */
  #menu-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; width:100%; max-width:750px; margin:0 auto; }
  #menu-bar.below-game{ position:static; left:auto; bottom:auto; height:auto; display:flex !important; flex-wrap:wrap; align-items:center; gap:6px; }
  #menu-btn, #chat-btn{ display:none !important; }
  #court > #volctl{ bottom:10px; background:rgba(20,24,36,0.9); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
  #chat.flash{ outline:2px solid #2f7fd6; outline-offset:2px; }
  /* Dim the on-screen icons to 40% during active play so they don't distract;
     hover (or an open menu) brings them back so they stay usable. */
  #court > #menu-btn, #court > #menu-bar, #court > #chat-btn, #court > #musicbtn{ transition:opacity .25s ease; }
  #court.playing #menu-btn,
  #court.playing #menu-bar,
  #court.playing #chat-btn,
  #court.playing #musicbtn{ opacity:0.4; }
  #court.playing #menu-btn:hover,
  #court.playing #chat-btn:hover,
  #court.playing #musicbtn:hover,
  #court.playing #menu-bar:hover,
  #court.playing #menu-btn[aria-expanded="true"],
  #court.playing #menu-bar.open{ opacity:1; }

  /* Latency indicator, top-left of the court (online only). */
  #pingbox{
    position:absolute; top:44px; left:16px; z-index:2; pointer-events:none;
    display:none; flex-direction:column; gap:3px;
    font-family:'PixelBold', monospace; font-size:9px; letter-spacing:1px;
    background:rgba(27,32,48,0.55); border:2px solid rgba(255,255,255,0.25);
    border-radius:6px; padding:5px 8px;
    text-shadow:2px 2px 0 rgba(0,0,0,0.4);
  }
  #pingbox .ping-row{ display:flex; align-items:center; gap:6px; }
  #pingbox .ping-who{ color:#9fb3d1; }
  #pingbox .ping-val{ margin-left:auto; font-variant-numeric:tabular-nums; }
  #pingbox .ping-val.good{ color:#5dd663; }
  #pingbox .ping-val.ok{   color:#f4b73e; }
  #pingbox .ping-val.bad{  color:#e8537f; }
  /* Volume panel, bottom-right of the court; only shown while music is on. */
  #volctl{
    position:absolute; right:12px; bottom:12px; z-index:3;
    display:none; flex-direction:column; gap:6px;
    background:rgba(27,32,48,0.7); border:2px solid rgba(255,255,255,0.25);
    border-radius:8px; padding:8px 10px;
    font-family:'PixelBold', monospace; font-size:9px; letter-spacing:1px; color:#cfd6e4;
  }
  #volctl.show{ display:flex; }
  #volctl .vol-row{ display:flex; align-items:center; gap:8px; justify-content:space-between; }
  #volctl .vol-row span{ flex:0 0 auto; white-space:nowrap; } /* hug the label, don't overflow the slider */
  #volctl input[type=range]{ width:96px; height:16px; cursor:pointer; accent-color:#4aa3ff; flex:0 0 auto; }
  #volctl .vol-toggle{
    align-self:stretch; font-family:'PixelBold', monospace; font-size:9px; letter-spacing:1px;
    color:#cfd6e4; background:rgba(255,255,255,0.06); border:1px solid #3a4150;
    border-radius:6px; padding:5px 8px; cursor:pointer;
  }
  #volctl .vol-toggle.on{ color:#5dd663; border-color:#5dd663; }

  /* App layout: a centered column (navbar, game, controls, skins). On wide
     screens the chat becomes a fixed right-hand side panel — see the
     @media (min-width:1100px) block placed AFTER the chat styles below (so its
     position:fixed wins over the base #chat position:relative by source order). */
  #app{ width:100%; display:flex; flex-direction:column; align-items:center; gap:12px; }
  #app-main{ width:100%; display:flex; flex-direction:column; align-items:center; gap:12px; min-width:0; }

  #stage{ position:relative; width:100%; max-width:750px; }
  /* Positioning context for the court overlays (msg, rematch, ping, pixi). */
  #court{ position:relative; width:100%; }
  #game{ width:100%; display:block; border-radius:12px; }
  /* Online guest: horizontally mirror the court canvas so this player sees
     their own slime on the left. Only the canvas flips — the HUD overlays
     (score, messages, ping) stay upright/readable. The simulation is identical
     on both peers; the guest's left/right input is swapped to match (see
     sampleLocalInput), so controls stay intuitive. */
  #stage.mirror #game, #stage.mirror #pixi-canvas{ transform:scaleX(-1); }
  #msg{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:12px; text-align:center; pointer-events:none;
    font-family:'PixelBold', monospace;
  }
  #msgtext{
    font-family:'PixelTitle', 'PixelBold', monospace;
    font-size:54px; font-weight:400; color:#fff; line-height:2.5rem;
    letter-spacing:2px;
    -webkit-text-stroke:5px #18223a;
    paint-order:stroke fill;
  }
  #msgsub{
    font-size:13px; color:#fff; line-height:1.7;
    -webkit-text-stroke:2px #18223a;
    paint-order:stroke fill;
  }
  /* "COUNTERED" popup: pops in big, settles, then floats up and fades. The
     .play class (re-added per event from JS) restarts the keyframes. */
  #countered-pop{
    position:absolute; left:50%; top:38%;
    transform:translate(-50%,-50%) scale(0.4);
    font-family:'PixelTitle','PixelBold',monospace; font-size:40px; letter-spacing:2px;
    color:#fff36b; -webkit-text-stroke:5px #18223a; paint-order:stroke fill;
    opacity:0; pointer-events:none; z-index:4; white-space:nowrap;
  }
  #countered-pop.play{ animation:counterPop 0.9s ease-out forwards; }
  #zone-pop{
    position:absolute; left:50%; top:30%; transform:translate(-50%,-50%) scale(0.4);
    font-family:'PixelTitle','PixelBold',monospace; font-size:30px; letter-spacing:2px; line-height:1.1;
    color:#ff5b5b; -webkit-text-stroke:5px #18223a; paint-order:stroke fill; text-align:center;
    max-width:90%; opacity:0; pointer-events:none; z-index:4; }
  #zone-pop.play{ animation:counterPop 1s ease-out forwards; }
  @keyframes counterPop{
    0%{   opacity:0; transform:translate(-50%,-50%) scale(0.4) rotate(-6deg); }
    18%{  opacity:1; transform:translate(-50%,-58%) scale(1.18) rotate(-3deg); }
    42%{  opacity:1; transform:translate(-50%,-62%) scale(1.0)  rotate(0deg); }
    100%{ opacity:0; transform:translate(-50%,-82%) scale(1.0)  rotate(0deg); }
  }
  #rematch{
    position:absolute; left:50%; top:62%; transform:translateX(-50%);
    z-index:3; display:flex; flex-direction:column; align-items:center; gap:8px;
    font-family:'PixelBold', monospace;
  }
  #rematch-msg{
    font-size:11px; letter-spacing:1px; color:#fff; text-align:center;
    text-shadow:2px 2px 0 rgba(0,0,0,0.5);
  }
  #rematch-hint{
    font-size:9px; letter-spacing:1px; color:#cfd6e4; text-align:center;
    text-shadow:1px 1px 0 rgba(0,0,0,0.5);
  }
  #rematch-hint:empty{ display:none; }
  #rematch-btns{ display:flex; gap:8px; }
  #rematch button{
    font-family:'PixelBold', monospace; font-size:11px; letter-spacing:1px;
    color:#fff; background:rgba(27,32,48,0.85); border:2px solid #cfd6e4;
    border-radius:8px; padding:8px 14px; cursor:pointer;
  }
  #rematch button:hover{ background:rgba(47,127,214,0.55); }
  #rematch button#rematch-yes{ border-color:#5dd663; }
  #rematch button#rematch-no{ border-color:#e8537f; }
  @media (max-width: 768px){
    #rematch-msg{ font-size:9px; }
    #rematch button{ font-size:10px; padding:7px 11px; }
    #msgtext{
      font-size:32px; line-height:1.6rem; letter-spacing:1px;
      -webkit-text-stroke-width:3px;
    }
    #msgsub{
      font-size:10px; line-height:1.6;
      -webkit-text-stroke-width:1.5px;
    }
  }

  #controls{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    width:100%; max-width:750px; flex-wrap:wrap;
  }
  #controlhint{ font-size:13px; color:var(--text-secondary); }
  #hint-row{ display:flex; flex-direction:row; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:6px 16px; width:100%; max-width:750px; margin:2px auto 0; }
  #controlhint-ui, #powerhint-ui{ font-size:13px; color:var(--text-secondary); text-align:center; }
  #powerhint{ font-size:13px; color:var(--text-secondary); }
  #btns{ display:flex; gap:8px; flex-wrap:wrap; }
  button{
    font-family:system-ui, sans-serif; font-size:13px; color:#e8ecf4;
    background:transparent; border:1px solid #3a4150; border-radius:8px;
    padding:8px 12px; cursor:pointer; transition:background .15s, transform .05s;
  }
  button:hover{ background:#262c3b; }
  button:active{ transform:scale(0.97); }
  /* Code input + Join are disabled while you're hosting a room you created. */
  #codeinput:disabled, #joinbtn:disabled{ opacity:0.45; cursor:not-allowed; }
  #codeinput:disabled:hover, #joinbtn:disabled:hover{ background:transparent; }

  /* The container ignores touches in its empty areas (so faded/empty space never
     blocks the court); only the interactive controls below opt back in. */
  #touchpad{ display:none; width:100%; max-width:750px; position:relative; pointer-events:none; }
  /* Pinned to the bottom of the viewport on any touch device so the player can
     always reach the controls without scrolling. (.show is only added on touch.) */
  #touchpad.show{
    display:flex;
    position:fixed; left:0; right:0; bottom:0;
    max-width:none; width:100%;
    padding:10px 12px;
    z-index:50;
  }
  /* Reserve scroll space so content isn't permanently hidden behind it. */
  body.touch-joystick{ padding-bottom:175px; }
  #touchpad-joystick{
    display:flex; width:100%; align-items:flex-end; justify-content:space-between;
    gap:12px; user-select:none; -webkit-user-select:none;
  }
  /* The joystick handles left/right; the JUMP button handles jumping. They sit
     on opposite sides (the default space-between layout above). */
  /* Opacity slider, centered along the bottom of the screen — lets the player
     fade the controls down so they don't obscure the court. */
  #joyopacity{
    position:absolute; left:50%; bottom:8px; transform:translateX(-50%); z-index:1;
    width:90px; height:22px; cursor:pointer; accent-color:#4aa3ff; pointer-events:auto;
  }
  /* Faint eye toggle above the slider: tap to hide the slider (and dim the icon,
     showing a slash); tap again to bring it back. Doesn't touch joystick opacity. */
  #joyopacity-eye{
    position:absolute; left:50%; bottom:34px; transform:translateX(-50%); z-index:1;
    width:24px; height:24px; pointer-events:auto; cursor:pointer; opacity:0.4; color:#cfd6e4;
    display:flex; align-items:center; justify-content:center;
  }
  #joyopacity-eye svg{ width:100%; height:100%; }
  #joyopacity-eye.off{ opacity:0.2; }
  #joyopacity-eye .eye-slash{ display:none; }
  #joyopacity-eye.off .eye-slash{ display:inline; }
  #joystick-base{
    position:relative; width:130px; height:130px; border-radius:50%;
    background:rgba(0,0,0,0.25); border:2px solid #3a4150;
    touch-action:none; flex-shrink:0; pointer-events:auto;
  }
  #joystick-knob{
    position:absolute; left:50%; top:50%;
    width:58px; height:58px; border-radius:50%;
    background:rgba(255,255,255,0.55); border:2px solid #e8ecf4;
    transform:translate(-50%, -50%); pointer-events:none;
    transition:background .1s;
  }
  #joystick-base.active #joystick-knob{ background:rgba(255,255,255,0.75); }
  /* White/gray to match the joystick: gray translucent base, white border + text,
     filling white on press like the knob does when active. */
  #joystick-jump{
    width:120px; height:120px; border-radius:50%;
    font-size:18px; font-weight:bold; letter-spacing:1px;
    background:rgba(0,0,0,0.25); border:2px solid #e8ecf4;
    color:#e8ecf4; flex-shrink:0; pointer-events:auto;
  }
  #joystick-jump:active{ background:rgba(255,255,255,0.55); color:#1a1f2e; }
  /* SPIKE sits just left of JUMP (JUMP stays in the thumb corner), a touch
     smaller, with the same gray/white styling that fills white on press. */
  #action-buttons{ display:flex; align-items:flex-end; gap:12px; flex-shrink:0; }
  #joystick-spike{
    width:96px; height:96px; border-radius:50%;
    font-size:15px; font-weight:bold; letter-spacing:1px;
    background:rgba(0,0,0,0.25); border:2px solid #e8ecf4;
    color:#e8ecf4; flex-shrink:0; pointer-events:auto;
  }
  #joystick-spike:active{ background:rgba(255,255,255,0.55); color:#1a1f2e; }

  #chat{
    position:relative;
    width:100%; max-width:750px; display:flex; flex-direction:column; gap:8px;
    border:1px solid var(--border); border-radius:12px; background:rgba(0,0,0,0.15);
    padding:12px;
  }
  #chat-header{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    font-family:'PixelBold', monospace; font-size:11px; letter-spacing:1px;
    color:#cfd6e4;
    padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }
  #chat-toggle{
    background:transparent; border:1px solid #3a4150; border-radius:6px;
    padding:4px 10px; color:#e8ecf4; font-size:12px; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
  }
  #chat-toggle:hover{ background:#262c3b; }
  #chat-toggle-icon{ display:inline-block; transition:transform .15s; }
  #chat.collapsed #chat-toggle-icon{ transform:rotate(-90deg); }
  #chat.collapsed{ gap:0; padding:8px 12px; }
  #chat.collapsed #chat-header{ padding-bottom:0; border-bottom:none; }
  #chat.collapsed > .row,
  #chat.collapsed #chat-messages,
  #chat.collapsed #chat-emoji-picker{ display:none; }
  #chat .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  #chat-profile-label, #chat-profile-p2-label{ font-size:12px; color:var(--text-secondary); }
  #chat-username-display, #chat-p2name-display{
    font-family:'PixelBold', monospace; font-size:11px; color:#bfe0ff;
    padding:4px 8px; border:1px solid #2f7fd6; border-radius:6px;
    background:rgba(47,127,214,0.15); letter-spacing:1px;
    max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  /* Player 2 is the pink slime — tint its name pill pink instead of blue. */
  #chat-p2name-display{ color:#ffc8dd; border-color:#e8537f; background:rgba(232,83,127,0.15); }
  #chat-username-input, #chat-p2name-input, #chat-input{
    font-family:system-ui, sans-serif; font-size:13px; color:#e8ecf4;
    background:rgba(0,0,0,0.2); border:1px solid #3a4150; border-radius:8px;
    padding:8px 10px;
  }
  #chat-username-input, #chat-p2name-input{ width:160px; }
  #chat-input{ flex:1; min-width:0; height:40px; padding:8px 12px; }
  #chat-input:disabled{ opacity:0.55; cursor:not-allowed; }

  #chat-emoji-btn{
    height:40px; width:40px; padding:0;
    display:flex; align-items:center; justify-content:center;
  }
  #chat-emoji-btn img{ width:20px; height:20px; display:block; }
  #chat-emoji-btn:disabled{ opacity:0.55; cursor:not-allowed; }

  #chat-emoji-picker{
    position:absolute; right:12px; bottom:60px;
    display:none; grid-template-columns:repeat(8, 1fr); gap:4px;
    padding:8px;
    background:rgba(20,24,40,0.97); border:1px solid var(--border);
    border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.5);
    z-index:10; max-width:320px;
  }
  #chat-emoji-picker.open{ display:grid; }
  #chat-emoji-picker button{
    width:30px; height:30px; padding:0;
    background:transparent; border:1px solid transparent; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  #chat-emoji-picker button:hover{ background:rgba(255,255,255,0.08); border-color:#3a4150; }
  #chat-emoji-picker img{ width:22px; height:22px; display:block; }
  #chat-messages{
    list-style:none; padding:8px 10px; margin:0; height:140px; overflow-y:auto;
    background:rgba(0,0,0,0.25); border-radius:8px; border:1px solid var(--border);
    font-size:13px; color:#e8ecf4; line-height:1.5;
  }
  #chat-messages li{ margin:0 0 4px 0; word-wrap:break-word; word-break:break-word; }
  #chat-messages li .user{ font-weight:bold; margin-right:6px; }
  #chat-messages li.system{ color:var(--text-tertiary); font-style:italic; }

  /* Chat as a fixed right-hand SIDE PANEL on wide screens. Placed AFTER the base
     #chat rules so its position:fixed wins (equal specificity -> source order).
     Width is a fraction of the game width and it's anchored just to the right of
     the centered game, so the gap between them stays small and constant at any
     width. To resize the panel, change --chat-frac only — the reserved gutter and
     the anchor position both derive from it. */
  @media (min-width:1100px){
    :root{
      --game-w: 750px;                                       /* the game's width */
      --chat-frac: 0.50;                                     /* panel width = frac × game width */
      --chat-w: calc(var(--game-w) * var(--chat-frac));
      --chat-gap: 16px;                                      /* gap between game and panel */
      --chat-gutter: calc(var(--chat-w) + var(--chat-gap) + 18px); /* reserved right space */
      --game-col: calc(100vw - 12px - var(--chat-gutter));   /* width of the game column (#app) */
    }
    body{ padding-right: var(--chat-gutter); }
    #chat{
      position:fixed; top:calc(24px + 56.48px); bottom:24px; right:auto;
      width: var(--chat-w);
      /* left = game's right edge + gap. Game right = leftpad(12) + col/2 +
         min(game, col)/2, so it tracks the game whether it's full or shrunk. */
      left: calc(12px + var(--game-col)/2 + min(var(--game-w), var(--game-col))/2 + var(--chat-gap));
      margin:0; z-index:20;
    }
    #chat-messages{ flex:1 1 auto; height:auto; min-height:0; } /* grow to fill the panel */
    #chat.collapsed{ bottom:auto; }                             /* shrink to just the header */
  }
  #chat-status{ font-size:12px; color:var(--text-secondary); min-height:16px; margin-left:auto; text-align:right; }

  /* --- WebGL CRT overlay (pixi-filters) --- */
  #pixi-canvas{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; border-radius:12px;
    display:none;
  }
  #stage:not([data-filter="off"]) #pixi-canvas{ display:block; }
  #stage:not([data-filter="off"]) #game{ visibility:hidden; }

  #skinpickers{
    width:100%; max-width:750px;
    display:flex; flex-direction:column; gap:10px;
    border:1px solid var(--border); border-radius:12px; background:rgba(0,0,0,0.15);
    padding:12px;
  }
  #skins-header{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    font-family:'PixelBold', monospace; font-size:11px; letter-spacing:1px;
    color:#cfd6e4;
    padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }
  #skins-toggle{
    background:transparent; border:1px solid #3a4150; border-radius:6px;
    padding:4px 10px; color:#e8ecf4; font-size:12px; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
  }
  #skins-toggle:hover{ background:#262c3b; }
  #skins-toggle-icon{ display:inline-block; transition:transform .15s; }
  #skinpickers.collapsed{ gap:0; }
  #skinpickers.collapsed #skins-toggle-icon{ transform:rotate(-90deg); }
  #skinpickers.collapsed #skins-header{ padding-bottom:0; border-bottom:none; }
  #skinpickers.collapsed #skin-grid{ display:none; }
  #skin-grid{ display:flex; gap:22px; align-items:flex-start; }
  .skin-col{ display:flex; flex-direction:column; gap:10px; min-width:0; }
  #skin-col-players{ flex:1.4; border-right:1px solid var(--border); padding-right:10px; }
  #skin-col-ball{ flex:1; }
  #skin-grid .skin-boss{ align-self:flex-start; }
  #theme-filter-row{ display:flex; gap:8px; flex-wrap:wrap; }
  @media (max-width:768px){
    #skin-grid{ flex-direction:column; }
    /* stacked on mobile: divider becomes horizontal */
    #skin-col-players{ border-right:none; padding-right:0; border-bottom:1px solid var(--border); padding-bottom:10px; }
    /* Scoreboard on mobile: drop the overlay and sit it in normal flow above the
       court. Make it COMPACT and centered instead of spreading names to the
       screen edges — each name sits next to its score group, dots shrink and the
       row wraps so it never overflows a narrow screen (or a high win target). */
    #sv-board{
      position:relative; top:auto; left:auto; right:auto; z-index:auto;
      margin-bottom:6px; padding:6px 8px; max-width:100%;
    }
    #sv-board .score-row{ align-self:auto; flex-wrap:wrap; justify-content:center; gap:6px 16px; }
    #sv-board .namescore{ flex:0 1 auto; justify-content:center; gap:6px; }
    #sv-board .scoregroup{ gap:6px; }
    #sv-board .dotrow{ display:none; } /* hide the point circles on mobile — just names + scores */
    #sv-board .numbox{ font-size:15px; min-width:34px; padding:5px 5px 4px; }
    /* the centered/wrapping row has no half to bound the name, so cap it explicitly;
       center the wrapped lines since both names sit centred on mobile */
    #sv-board .lbl{ font-size:10px; line-height:14px; max-width:55vw; text-align:center; } /* font-size + 4px -> ~4px gap */
  }
  .skin-picker{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .skin-picker.dimmed{ opacity:0.2; pointer-events:none; }
  .skin-label{
    font-family:'PixelBold', monospace; font-size:11px; letter-spacing:1px;
    color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,0.45);
    text-transform:capitalize;
    padding-right:10px;
  }
  .skin-label.blue{ color:#bfe0ff; }
  .skin-label.pink{ color:#ffc8dd; }
  .skin-label.ball{ color:#ffd23f; }
  .swatches{ display:flex; gap:5px; flex-wrap:wrap; }
  .swatch{
    width:20px; height:20px; padding:0;
    border-radius:50%; border:2px solid #3a4150;
    cursor:pointer; background:transparent;
    transition:transform .1s, border-color .15s;
  }
  .swatch:hover{ border-color:#9aa3b8; }
  .swatch.selected{ border-color:#fff; transform:scale(1.18); }
  /* Custom color picker shown as an eyedropper icon (light gray, white on hover);
     the real color input sits invisibly on top to catch the click. */
  .skin-eyedropper{
    position:relative; display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; cursor:pointer; color:#9aa3b8;
    transition:color .15s;
  }
  .skin-eyedropper:hover{ color:#fff; }
  .skin-eyedropper svg{ width:18px; height:18px; display:block; pointer-events:none; }
  .skin-custom{
    position:absolute; inset:0; width:100%; height:100%;
    margin:0; padding:0; border:0; opacity:0; cursor:pointer;
    transform:translateX(35px); /* nudge the native picker dialog ~35px right */
  }
  .skin-boss{
    font-family:system-ui, sans-serif; font-size:11px; color:#e8ecf4;
    background:transparent; border:1px solid #3a4150; border-radius:8px;
    padding:5px 9px; cursor:pointer; white-space:nowrap;
  }
  .skin-boss:hover{ background:#262c3b; }
  .skin-boss.active{ border-color:#c040d0; color:#f0c8ff; }

  /* --- Film-grain noise overlay (always on, sits above filter) --- */
  #noise-overlay{
    position:absolute; inset:0; pointer-events:none;
    border-radius:12px;
    mix-blend-mode:multiply;
    background-repeat:repeat;
    opacity:1;
  }

  #version{
    width:100%; max-width:750px;
    margin-top:4px; padding-top:18px; padding-bottom:18px;
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px solid rgba(255,255,255,0.12);
    font-family:'PixelBold', monospace; font-size:10px; letter-spacing:1px;
    color:var(--text-tertiary);
  }
  #footer-social{ display:inline-flex; align-items:center; gap:12px; }
  .footer-icon{
    display:inline-flex; align-items:center;
    color:#6b7488; transition:color .15s;
  }
  .footer-icon:hover{ color:#fff; }
  .footer-icon svg{ width:22px; height:22px; display:block; fill:currentColor; }
  #version-text{ display:inline-flex; align-items:center; }
  .footer-sep{ display:inline-block; width:1px; height:11px; margin:0 9px; background:currentColor; opacity:0.45; }
</style>

  <div id="stage" data-filter="off">

          <span class="lbl pink" id="p2name">WHITE SLIME</span>
        </div>
      </div>
    </div>
    <!-- The court: canvas + its overlays. position:relative so #msg / #rematch /
         pingbox / pixi-canvas anchor to the court itself, not the whole #stage
         (which also holds the scoreboard, in-flow above the court on mobile). -->
    <div id="court">
    <canvas id="game" width="750" height="375"></canvas>
    <canvas id="pixi-canvas" width="750" height="375"></canvas>

    <div id="pingbox">
      <span class="ping-row"><span class="ping-who">YOU</span><span id="ping-you" class="ping-val">--</span></span>

      <div id="msgsub">PRESS SPACE OR TAP</div>
    </div>
    <!-- Transient "COUNTERED" callout (a sibling of the canvas, so it isn't
         flipped by the guest's mirror). Animation re-triggered from JS. -->
    <div id="countered-pop" aria-hidden="true">COUNTERED</div>
    <div id="zone-pop" aria-hidden="true">YOU'RE IN THE ZONE</div>
    <div id="rematch" style="display:none;">
      <div id="rematch-msg"></div>
      <div id="rematch-btns">
        <button id="rematch-ask" type="button">Rematch</button>
        <button id="rematch-yes" type="button">Yes</button>
        <button id="rematch-no" type="button">No</button>
      </div>
      <div id="rematch-hint"></div>
    </div>
    <!-- Volume panel: shown in the bottom-right while music is on. -->
    <div id="volctl">
      <button id="musictoggle" type="button" class="vol-toggle">Music: Off</button>
      <label class="vol-row"><span>Music</span><input id="vol-music" type="range" min="0" max="100" step="5" aria-label="Music volume"></label>
      <label class="vol-row"><span>SFX</span><input id="vol-sfx" type="range" min="0" max="100" step="5" aria-label="Sound effects volume"></label>
    </div>
    <!-- In-game options menu: a gear pinned to the court's bottom-left opens a
         pop-up holding all the game options (moved in by JS so the whole game is
         self-contained on screen, ready for the Google Play build). Chat stays in
         the side panel; the Chat item links to it. -->
    <button id="menu-btn" type="button" aria-label="Game menu" title="Menu" aria-expanded="false">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M19.14 12.94c.04-.31.06-.62.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.62-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.43.32.61.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.58-.24 1.12-.56 1.62-.94l2.39.96c.18.1.47.02.61-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2Z"/></svg>
    </button>
    <div id="menu-bar" aria-hidden="true">
      <button class="menu-cat" type="button" data-cat="online">Online</button>
      <button class="menu-cat" type="button" data-cat="mode">Mode</button>
      <button class="menu-cat" type="button" data-cat="skins">Skins</button>
      <button class="menu-cat" type="button" data-cat="stage">Stage</button>
    </div>
    <div id="menu-panel" aria-hidden="true">
      <div class="menu-pane" id="cat-online"></div>
      <div class="menu-pane" id="cat-mode"></div>
      <div class="menu-pane" id="cat-skins"></div>
      <div class="menu-pane" id="cat-stage"></div>
    </div>
    <button id="chat-btn" type="button" aria-label="Open chat" title="Chat"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zM7 9h10v2H7V9zm6 4H7v-2h6v2zm4-6H7V5h10v2z"/></svg></button>
    </div><!-- /#court -->
  </div>

  <div id="hint-row">
    <div id="controlhint-ui" class="controlhint"></div>
    <div id="powerhint-ui" class="powerhint" style="display:none;"></div>
  </div>

  <div id="controls">
    <div id="controlhint" class="controlhint"></div>
    <div id="powerhint" class="powerhint" style="display:none;"></div>
    <div id="btns">
      <button id="onlinebtn">Online</button>
      <button id="winmodebtn" style="display:none;">Mode: First to 6</button>
      <button id="modebtn">Mode: 1 Player</button>
      <button id="oppbtn">Opponent: White Slime</button>
      <button id="gamemodebtn">Rules: Classic Slime</button>
      <button id="resetbtn">Restart</button>
      <button id="leavebtn" style="display:none;">Leave Room</button>
      <button id="musicbtn" type="button" class="music-off" aria-label="Toggle music" title="Music">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="skinpickers">
    <div id="skins-header">
      <span>SKINS</span>
      <button id="skins-toggle" type="button" aria-expanded="true" aria-controls="skinpickers">
        <span id="skins-toggle-label">Hide skins</span>
        <span id="skins-toggle-icon">&#9662;</span>
      </button>
    </div>
    <div id="skin-grid">
    <div class="skin-col" id="skin-col-players">
    <div class="skin-picker" id="skin-p1">
      <span class="skin-label blue">player 1</span>
      <div class="swatches" data-side="p1"></div>
      <label class="skin-eyedropper" title="Custom color" aria-label="Custom color">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg>
        <input type="color" class="skin-custom" data-side="p1" />
      </label>
      <button class="skin-boss" type="button" data-side="p1">Boss: Off</button>
    </div>
    <div class="skin-picker" id="skin-p2" style="display:none;">
      <span class="skin-label pink">player 2</span>
      <div class="swatches" data-side="p2"></div>
      <label class="skin-eyedropper" title="Custom color" aria-label="Custom color">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg>
        <input type="color" class="skin-custom" data-side="p2" />
      </label>
      <button class="skin-boss" type="button" data-side="p2">Boss: Off</button>
    </div>
    </div>
    <div class="skin-col" id="skin-col-ball">
    <div class="skin-picker" id="skin-ball">
      <span class="skin-label ball">ball</span>
      <div class="swatches" data-side="ball"></div>
      <label class="skin-eyedropper" title="Custom ball color" aria-label="Custom ball color">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m2 22 1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l.4.4a2.1 2.1 0 1 1-3 3l-3.8-3.8a2.1 2.1 0 1 1 3-3l.4.4Z"/></svg>
        <input type="color" class="skin-custom" data-side="ball" />
      </label>
      <button class="skin-boss" type="button" data-side="ball">Ball: Off</button>
    </div>
      <div id="theme-filter-row">
        <button id="themebtn">Stage: Grassy</button>
        <button id="filterbtn">Filter: Off</button>
      </div>
    </div>
    </div>
  </div>

  <div id="lobby" style="display:none; width:100%; max-width:750px; margin:0 auto; border-radius:12px; background:rgba(0,0,0,0.15);">
    <div id="lobbyhome" style="display:flex; flex-direction:column; gap:10px; align-items:stretch;">
      <div class="lobby-row">
        <label style="color:var(--text-secondary); display:inline-flex; align-items:center; gap:6px;">
          First to
          <select id="winselect">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6" selected>6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
          </select>
        </label>
        <button id="createbtn">Create game</button>
      </div>
      <div class="lobby-row">
        <span style="color:var(--text-secondary);">OR</span>
        <input id="codeinput" maxlength="4" placeholder="CODE" style="text-transform:uppercase; width:90px; text-align:center; letter-spacing:3px;" />
        <button id="joinbtn">Join</button>
        <button id="spectatebtn">Spectate</button>
      </div>
      <button id="lobbyclose" style="margin-left:auto;">Close</button>
    </div>
    <div id="lobbystatus" style="margin-top:10px; font-size:13px; color:var(--text-secondary); min-height:18px; display:none;"></div>
  </div>
  </div><!-- /#app-main -->

  <div id="chat">
    <div id="chat-header">
      <span>CHAT</span>
      <button id="chat-toggle" type="button" aria-expanded="true" aria-controls="chat">
        <span id="chat-toggle-label">Hide chat</span>
        <span id="chat-toggle-icon">&#9662;</span>
      </button>
    </div>
    <div id="chat-profile" class="row">
      <span id="chat-profile-label">Username:</span>
      <span id="chat-username-display">Player</span>
      <input id="chat-username-input" type="text" maxlength="16" placeholder="Set a username" />
      <button id="chat-username-save">Save</button>
      <div id="chat-status"></div>
    </div>
    <!-- Player 2's name (local 2-player only; shown/hidden from JS). -->
    <div id="chat-profile-p2" class="row" style="display:none;">
      <span id="chat-profile-p2-label">Pink Slime:</span>
      <span id="chat-p2name-display">Player 2</span>
      <input id="chat-p2name-input" type="text" maxlength="16" placeholder="Name Player 2" />
      <button id="chat-p2name-save">Save</button>
    </div>
    <ul id="chat-messages" aria-live="polite"></ul>
    <div class="row">
      <input id="chat-input" type="text" maxlength="200" placeholder="Connect to an opponent to chat..." disabled />
      <button id="chat-emoji-btn" type="button" title="Insert emoji" aria-label="Insert emoji" disabled>
        <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f604/emoji.svg" alt="" />
      </button>
      <button id="chat-send" disabled>Send</button>
    </div>
    <div id="chat-emoji-picker" aria-hidden="true"></div>
  </div>
  </div><!-- /#app -->

  <div id="touchpad">
    <span id="joyopacity-eye" role="button" tabindex="0" aria-label="Hide controls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/><line class="eye-slash" x1="3" y1="3" x2="21" y2="21"/></svg></span>
    <input id="joyopacity" type="range" min="10" max="100" step="5" value="100" aria-label="Controls opacity">
    <div id="touchpad-joystick">
      <div id="joystick-base" aria-label="Joystick">
        <div id="joystick-knob"></div>
      </div>
      <div id="action-buttons">
        <button id="joystick-spike" aria-label="Spike" style="display:none;">SPIKE</button>
        <button id="joystick-jump" aria-label="Jump">JUMP</button>
      </div>
    </div>
  </div>

  <!-- Background music (loops). Toggled by the sound icon in the controls row. -->
  <audio id="bgmusic" loop preload="none" src="BGM-1.mp3"></audio>
