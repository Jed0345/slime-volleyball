# fly.toml app configuration file generated for slime-volleyball on 2026-05-28T03:18:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'slime-volleyball'
primary_region = 'ewr'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
